<style>
:root{--bg:#FBFAF7;--surface:#FFFFFF;--surface2:#F4F2EC;--ink:#1B1E23;--muted:#6C7078;--line:#E6E3DC;--accent:#0F7F63;--accent-soft:#0f7f6318;--yahoo:#2F55B8;--mercari:#D6336C;--warn:#9A6A12;--focus:#0F7F63;--shadow:0 1px 2px rgba(20,22,28,.05),0 6px 20px rgba(20,22,28,.05);}

:root[data-theme="light"]{--bg:#FBFAF7;--surface:#FFFFFF;--surface2:#F4F2EC;--ink:#1B1E23;--muted:#6C7078;--line:#E6E3DC;--accent:#0F7F63;--accent-soft:#0f7f6318;--yahoo:#2F55B8;--mercari:#D6336C;--warn:#9A6A12;--focus:#0F7F63;--shadow:0 1px 2px rgba(20,22,28,.05),0 6px 20px rgba(20,22,28,.05);}
:root[data-theme="dark"]{--bg:#0F1216;--surface:#161A20;--surface2:#1E232B;--ink:#E9ECEF;--muted:#98A0AA;--line:#28303A;--accent:#38C39C;--accent-soft:#38c39c1f;--yahoo:#7E9BF0;--mercari:#F368A0;--warn:#E0AA5A;--focus:#38C39C;--shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.35);}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;}
.wrap{max-width:720px;margin:0 auto;padding:0 14px 60px;}
header{position:sticky;top:0;z-index:20;background:var(--bg);padding-top:12px;border-bottom:1px solid var(--line);margin-bottom:12px;}
.topline{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:8px;}
.brand{font-weight:800;font-size:18px;}
.brand small{font-weight:600;color:var(--muted);font-size:11px;letter-spacing:.05em;margin-left:6px;}
.theme-btn{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer;}
.theme-btn:focus-visible{outline:2px solid var(--focus);outline-offset:2px;}
.searchbox{position:relative;margin-bottom:10px;}
.searchbox input{width:100%;padding:13px 40px 13px 14px;font-size:16px;color:var(--ink);background:var(--surface);border:1.5px solid var(--line);border-radius:12px;box-shadow:var(--shadow);}
.searchbox input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--accent-soft);}
.searchbox .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:var(--surface2);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;display:none;}
.sugg{position:absolute;left:0;right:0;top:52px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:30;overflow:hidden;display:none;}
.sugg-item{padding:10px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;}
.sugg-item:last-child{border-bottom:none;}
.sugg-item:hover,.sugg-item.on{background:var(--accent-soft);}
.sugg-item small{color:var(--muted);font-size:11px;flex:0 0 auto;}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;flex:0 0 auto;}
.chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff;}
.chip:focus-visible{outline:2px solid var(--focus);outline-offset:2px;}
.brandbar{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 12px;}
.brandbtn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:600;cursor:pointer;}
.brandbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.brandbtn small{color:var(--muted);font-weight:500;margin-left:5px;}
.brandbtn.on small{color:#e8fff7;}
.meta{color:var(--muted);font-size:12.5px;margin:2px 2px 12px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:13px 13px 6px;margin-bottom:12px;}
.card h2{margin:0 0 3px;font-size:16px;font-weight:750;line-height:1.35;text-wrap:balance;}
.tag{display:inline-block;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:6px;padding:2px 7px;margin-bottom:10px;}
.src{margin:0 0 10px;}
.src-h{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;margin-bottom:5px;}
.dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.src-sub{color:var(--muted);font-weight:500;font-size:11px;}
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;}
th,td{text-align:right;padding:5px 4px;font-size:12.5px;border-bottom:1px solid var(--line);}
th{color:var(--muted);font-weight:600;font-size:10.5px;letter-spacing:.02em;}
th.l,td.l{text-align:left;}
tbody tr:last-child td{border-bottom:none;}
td.med{color:var(--accent);font-weight:750;}
td.n{color:var(--muted);}
tr.few td{color:var(--muted);}
.none{color:var(--muted);font-size:12px;padding:2px 0 8px;}
.empty{text-align:center;color:var(--muted);padding:36px 16px;line-height:1.7;}
.empty b{color:var(--ink);display:block;font-size:16px;margin-bottom:6px;}
.foot{color:var(--muted);font-size:11px;text-align:center;margin-top:24px;line-height:1.7;}
.warn{margin:6px 0 10px;padding:8px 10px;border-radius:10px;font-size:12px;line-height:1.75;border:1px solid}.warn.w2{background:rgba(214,69,45,.12);border-color:rgba(214,69,45,.45)}.warn.w1{background:rgba(220,150,0,.10);border-color:rgba(220,150,0,.35)}.warn b{display:block;margin-bottom:2px}.warn.w2 b{color:#c0392b}.warn.w1 b{color:#a97400}.wchip{display:inline-block;margin:2px 4px 0 0;padding:1px 8px;border-radius:999px;background:rgba(128,128,128,.16)}@media (prefers-color-scheme:dark){.warn.w2 b{color:#ff8a75}.warn.w1 b{color:#e8b558}}:root[data-theme=dark] .warn.w2 b{color:#ff8a75}:root[data-theme=dark] .warn.w1 b{color:#e8b558}:root[data-theme=light] .warn.w2 b{color:#c0392b}:root[data-theme=light] .warn.w1 b{color:#a97400}.sugg-item .flag{margin-left:4px}</style>
